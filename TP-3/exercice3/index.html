<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="main.js" defer></script>
</head>
<body>
     <form action="">
        <Div class ="Registre">
            <h2> Formulaire Etudiant </h2>
             <label for="CoddeEtud"> Code Etudiant:    </label>
            <Input class="InscrForm" id="CoddeEtud" type="text" placeholder="saisie votre code étudiant" novalidate="">
            <br>
            <label for="Nom"> Nom :    </label>
            <Input class="InscrForm" id="Nom" type="text" placeholder="saisie votre nom" novalidate="">
            <br>
            <label for="Prenom">   Prénom :    </label>
            <Input class="InscrForm" id="Prenom" type="text" placeholder="saisie votre prénom" novalidate="">
            <br>
            <Label for="Modules">Note Modules :    </Label>
          <input type="number" class="InscrForm" id="module1" placeholder="M 1">
            <input type="number" class="InscrForm" id="module2" placeholder="M 2">
            <input type="number" class="InscrForm" id="module3" placeholder="M 3">
             <input type="number" class="InscrForm" id="module4" placeholder="M 4">
             <input type="number" class="InscrForm" id="module5" placeholder="M 5">
             <input type="number" class="InscrForm" id="module6" placeholder="M 6">
             <br>
           
            <label for="Langue"> Langue :    </label>
            <select name="semester" id="Semester">
                <option value="semester 1">Semester 1</option>
                <option value="semester 2">Semester 2</option>
            </select>
            <br> <br>
         
             <input type="button" value="Annuler" id="Annuler">
             <input type="submit" value="Valider" id="Valider">
        </Div>
        <table id="resultTable" border="1" style="margin-top: 20px; width: 100%; text-align: center;">
    <thead>
        <tr>
            <th>Code étudiant</th>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Semestre</th>
            <th>Module 1</th>
            <th>Module 2</th>
            <th>Module 3</th>
            <th>Module 4</th>
            <th>Module 5</th>
            <th>Module 6</th>
            <th>Moyenne</th>
            <th>Décision</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        </tbody>
</table>
    </form>
  
</body>
</html>
